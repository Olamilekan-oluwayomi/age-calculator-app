<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Age calculator app</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;1,400;1,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./dist/style.css" />

    <script src="./js/app.js" type="module" defer></script>
  </head>
  <body>
    <main class="calculator-container">
      <form class="age-form" id="ageForm" novalidate>
        <div class="input-group">
          <div class="input-control" id="dayControl">
            <label for="day">Day</label>
            <input
              type="number"
              id="day"
              name="day"
              placeholder="DD"
              min="1"
              max="31"
            />
            <small class="error-message"></small>
          </div>

          <div class="input-control" id="monthControl">
            <label for="month">Month</label>
            <input
              type="number"
              id="month"
              name="month"
              placeholder="MM"
              min="1"
              max="12"
            />
            <small class="error-message"></small>
          </div>

          <div class="input-control" id="yearControl">
            <label for="year">Year</label>
            <input type="number" id="year" name="year" placeholder="YYYY" />
            <small class="error-message"></small>
          </div>
        </div>

        <div class="action-container">
          <hr class="divider-line" />
          <button type="submit" class="submit-btn" aria-label="Calculate Age">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="46"
              height="44"
              viewBox="0 0 46 44"
            >
              <g fill="none" stroke="#FFF" stroke-width="3">
                <path
                  d="M1 22.019C8.333 21.686 23 25.616 23 44M23 44V0M23 44c0-18.384 14.667-22.314 22-22.019"
                />
              </g>
            </svg>
          </button>
        </div>
      </form>

      <section class="results-display" aria-live="polite">
        <div class="result-item">
          <span class="result-number" id="resultYears">--</span>
          <span class="result-label">years</span>
        </div>
        <div class="result-item">
          <span class="result-number" id="resultMonths">--</span>
          <span class="result-label">months</span>
        </div>
        <div class="result-item">
          <span class="result-number" id="resultDays">--</span>
          <span class="result-label">days</span>
        </div>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        rel="noopener"
        >Frontend Mentor</a
      >. Coded by <a href="#">Lizzle</a>.
    </footer>
  </body>
</html>
